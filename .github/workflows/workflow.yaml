name: CI do FrontEnd

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v6

      - name: Configurações Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Configurações pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false

      - name: Instalar dependências
        run: pnpm install --no-frozen-lockfile

      - name: Rodar testes
        run: pnpm test

      - name: Prebuild do Android
        run: pnpm expo prebuild --platform android
        env:
          EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
          EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN: ${{ secrets.EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN }}
          EXPO_PUBLIC_EAS_BUILD_PROFILE: ${{ secrets.EXPO_PUBLIC_EAS_BUILD_PROFILE }}
          EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID: ${{secrets.EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID}}
          EXPO_PUBLIC_CLOUDINARY_BASE_LINK: ${{secrets.EXPO_PUBLIC_CLOUDINARY_BASE_LINK}}

      - name: Publicar Update no EAS (Production e Preview)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          EXPO_PUBLIC_EAS_BUILD_PROFILE=production npx --yes eas-cli@latest update --branch production --message "${{ github.event.head_commit.message }}"
          EXPO_PUBLIC_EAS_BUILD_PROFILE=preview npx --yes eas-cli@latest update --branch preview --message "${{ github.event.head_commit.message }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
          EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN: ${{ secrets.EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN }}
          EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_CLOUDINARY_BASE_LINK: ${{ secrets.EXPO_PUBLIC_CLOUDINARY_BASE_LINK }}

      - name: Pegar link do APK e atualizar na Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          APK_URL=$(curl -s -X POST "https://api.expo.dev/graphql" \
            -H "Authorization: Bearer ${{ secrets.EXPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "{ app { byId(appId: \"${{ secrets.EXPO_APP_ID }}\") { builds(limit: 1, offset: 0, filter: { platform: ANDROID, buildProfile: \"preview\" }) { artifacts { buildUrl } } } } }"
            }' | jq -r '.data.app.byId.builds[0].artifacts.buildUrl')

          echo "APK_URL: $APK_URL"

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERRO: VERCEL_TOKEN está vazio!"
          else
            echo "VERCEL_TOKEN ok"
          fi

          curl -X PATCH "https://api.vercel.com/v9/projects/piggy-xp-landing-page/env/z8Y29dQ9D0TfKeLF" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$APK_URL\"}"

          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
