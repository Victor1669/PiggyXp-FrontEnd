name: CI do FrontEnd

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v6

      - name: Configurações Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Configurações pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false

      - name: Instalar dependências
        run: pnpm install --no-frozen-lockfile

      - name: Rodar testes
        run: pnpm test

      - name: Prebuild do Android
        run: pnpm expo prebuild --platform android
        env:
          EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
          EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN: ${{ secrets.EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN }}
          EXPO_PUBLIC_EAS_BUILD_PROFILE: ${{ secrets.EXPO_PUBLIC_EAS_BUILD_PROFILE }}
          EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID: ${{secrets.EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID}}
          EXPO_PUBLIC_CLOUDINARY_BASE_LINK: ${{secrets.EXPO_PUBLIC_CLOUDINARY_BASE_LINK}}

      - name: Publicar Update no EAS (Production e Preview)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          EXPO_PUBLIC_EAS_BUILD_PROFILE=production npx --yes eas-cli@latest update --branch production --message "${{ github.event.head_commit.message }}"
          EXPO_PUBLIC_EAS_BUILD_PROFILE=preview npx --yes eas-cli@latest update --branch preview --message "${{ github.event.head_commit.message }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
          EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN: ${{ secrets.EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN }}
          EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_CLOUDINARY_BASE_LINK: ${{ secrets.EXPO_PUBLIC_CLOUDINARY_BASE_LINK }}

      - name: Pegar link do APK e atualizar na Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -uo pipefail

          # Pega a build mais recente do perfil "preview" para Android
          BUILD_JSON=$(npx --yes eas-cli@latest build:list \
            --platform=android \
            --profile=preview \
            --status=finished \
            --limit=1 \
            --non-interactive \
            --json 2>&1) || {
              echo "Falha no build:list. Saída completa:"
              echo "$BUILD_JSON"
              exit 1
            }

          APK_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // "null"')
          EXPIRATION=$(echo "$BUILD_JSON" | jq -r '.[0].expirationDate // "null"')

          echo "APK_URL atual: $APK_URL"
          echo "Expira em: $EXPIRATION"

          NOW=$(date -u +%s)
          NEEDS_NEW_BUILD="false"

          if [ "$APK_URL" = "null" ] || [ -z "$APK_URL" ]; then
            echo "Nenhuma build encontrada."
            NEEDS_NEW_BUILD="true"
          elif [ "$EXPIRATION" != "null" ]; then
            EXP_TS=$(date -u -d "$EXPIRATION" +%s)
            if [ "$EXP_TS" -le "$NOW" ]; then
              echo "Build expirada."
              NEEDS_NEW_BUILD="true"
            fi
          fi

          if [ "$NEEDS_NEW_BUILD" = "true" ]; then
            echo "Disparando nova build..."
            NEW_BUILD_JSON=$(EXPO_PUBLIC_EAS_BUILD_PROFILE=preview npx --yes eas-cli@latest build \
              --platform=android \
              --profile=preview \
              --non-interactive \
              --no-wait=false \
              --json 2>&1) || {
                echo "Falha no eas build. Saída completa:"
                echo "$NEW_BUILD_JSON"
                exit 1
              }

            APK_URL=$(echo "$NEW_BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // .artifacts.buildUrl // "null"')
            echo "Nova APK_URL: $APK_URL"
          fi

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "ERRO: não foi possível obter uma APK_URL válida."
            exit 1
          fi

          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "ERRO: VERCEL_TOKEN está vazio!"
            exit 1
          fi

          curl -sf -X PATCH "https://api.vercel.com/v9/projects/piggy-xp-landing-page/env/z8Y29dQ9D0TfKeLF" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$APK_URL\"}"

          curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
          EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN: ${{ secrets.EXPO_PUBLIC_FACEBOOK_CLIENT_TOKEN }}
          EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_WEB_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_CLOUDINARY_BASE_LINK: ${{ secrets.EXPO_PUBLIC_CLOUDINARY_BASE_LINK }}
